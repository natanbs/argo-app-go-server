apiVersion: apps/v1
kind: Deployment
metadata:
  name: argo-app-go-server
  namespace: go-server-ns
spec:
  selector:
    matchLabels:
      app: argo-app-go-server
  replicas: 1
  minReadySeconds: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: argo-app-go-server
    spec:
      containers:
      - name: argo-app-go-server
        image:
          repository: k3d-reg:5000/argo-app-go-server
          tag: "v1.4"
          pullPolicy: IfNotPresent
        ports:
        - containerPort: 8090
