apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-app-go-server
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/natanbs/argo-app-go-server
    targetRevision: main
    path: app
  destination:
    namespace: go-server-ns
    server: https://kubernetes.default.svc
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
