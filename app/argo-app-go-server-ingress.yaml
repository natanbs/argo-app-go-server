apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argo-app-go-server-ing
  namespace: go-server-ns
  annotations:
    ingress.kubernetes.io/ssl-redirect: "false"
    traefik.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - http:
      paths:
      - backend:
          service:
            name: argo-app-go-server
            port:
              number: 8090
        path: /
        pathType: Prefix
